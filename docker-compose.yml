version: '3.9'

# ──────────────────────────────────────────────────────────────────────────────
# APASBAC API — Docker Compose para testes locais
# ──────────────────────────────────────────────────────────────────────────────
# Uso rápido:
#   docker compose up -d
#   docker compose exec api npx prisma migrate dev --name init
#   docker compose exec api npm run prisma:seed
#   Acesse: http://localhost:3000/api/v1
#   Swagger: http://localhost:3000/docs
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: apasbac_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apasbac}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apasbac_local_pass}
      POSTGRES_DB: ${POSTGRES_DB:-apasbac}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-apasbac}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - apasbac_net

  # ── API NestJS ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder           # usa stage builder para dev (hot reload disponível)
    container_name: apasbac_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker             # arquivo de env específico para Docker local
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-apasbac}:${POSTGRES_PASSWORD:-apasbac_local_pass}@db:5432/${POSTGRES_DB:-apasbac}
      NODE_ENV: development
    ports:
      - '3000:3000'
    volumes:
      - .:/app                  # monta código para hot reload
      - /app/node_modules       # preserva node_modules do container
      - /app/dist               # preserva dist do container
    command: >
      sh -c "
        npx prisma generate &&
        npx prisma migrate deploy &&
        npm run start:dev
      "
    networks:
      - apasbac_net

  # ── Adminer (GUI para o banco — apenas local) ─────────────────────────────
  adminer:
    image: adminer:4
    container_name: apasbac_adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha-dark
    networks:
      - apasbac_net

volumes:
  postgres_data:
    driver: local

networks:
  apasbac_net:
    driver: bridge
